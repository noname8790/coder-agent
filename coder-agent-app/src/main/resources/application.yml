server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: coder-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:13306/coder-agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:mybatis/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

coder-agent:
  pgvector:
    enabled: ${PGVECTOR_ENABLED:false}
    url: ${PGVECTOR_URL:jdbc:postgresql://127.0.0.1:15432/coder-agent}
    username: ${PGVECTOR_USERNAME:postgres}
    password: ${PGVECTOR_PASSWORD:}
    schema: ${PGVECTOR_SCHEMA:public}
    table-prefix: ${PGVECTOR_TABLE_PREFIX:coder_agent}
    vector-dimensions: ${PGVECTOR_VECTOR_DIMENSIONS:1024}
    index-type: ${PGVECTOR_INDEX_TYPE:hnsw}
    similarity: ${PGVECTOR_SIMILARITY:cosine}
  embedding:
    provider: ${EMBEDDING_PROVIDER:openai-compatible}
    base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_MODEL:text-embedding-v4}
    endpoint-type: ${EMBEDDING_ENDPOINT_TYPE:embeddings}
    timeout-seconds: ${EMBEDDING_TIMEOUT_SECONDS:120}
  memory:
    enabled: ${MEMORY_ENABLED:false}
    candidate-top-k: ${MEMORY_CANDIDATE_TOP_K:24}
    selected-top-k: ${MEMORY_SELECTED_TOP_K:8}
    top-k: ${MEMORY_CANDIDATE_TOP_K:24}
    min-score: ${MEMORY_MIN_SCORE:0.35}
    min-trust-score: ${MEMORY_MIN_TRUST_SCORE:0.65}
    max-chunks-per-run: ${MEMORY_MAX_CHUNKS_PER_RUN:12}
    max-embedding-calls-per-run: ${MEMORY_MAX_EMBEDDING_CALLS_PER_RUN:8}
    max-auto-summary-files-per-run: ${MEMORY_MAX_AUTO_SUMMARY_FILES_PER_RUN:12}
    max-file-bytes-for-summary: ${MEMORY_MAX_FILE_BYTES_FOR_SUMMARY:262144}
    chunk-max-tokens: ${MEMORY_CHUNK_MAX_TOKENS:1200}
    chunk-overlap-tokens: ${MEMORY_CHUNK_OVERLAP_TOKENS:120}
  context:
    compression-enabled: ${CONTEXT_COMPRESSION_ENABLED:true}
    max-context-tokens: ${CONTEXT_MAX_CONTEXT_TOKENS:131072}
    max-input-tokens: ${CONTEXT_MAX_INPUT_TOKENS:106496}
    max-output-tokens: ${CONTEXT_MAX_OUTPUT_TOKENS:8192}
    safety-reserve-tokens: ${CONTEXT_SAFETY_RESERVE_TOKENS:16384}
    system-reserve-tokens: ${CONTEXT_SYSTEM_RESERVE_TOKENS:2000}
    prefix-budget-tokens: ${CONTEXT_PREFIX_BUDGET_TOKENS:8192}
    working-memory-budget-tokens: ${CONTEXT_WORKING_MEMORY_BUDGET_TOKENS:12288}
    memory-budget-tokens: ${CONTEXT_MEMORY_BUDGET_TOKENS:12288}
    file-summary-budget-tokens: ${CONTEXT_FILE_SUMMARY_BUDGET_TOKENS:16384}
    raw-snippet-budget-tokens: ${CONTEXT_RAW_SNIPPET_BUDGET_TOKENS:32768}
    tool-result-budget-tokens: ${CONTEXT_TOOL_RESULT_BUDGET_TOKENS:20480}
    recent-message-budget-tokens: ${CONTEXT_RECENT_MESSAGE_BUDGET_TOKENS:16384}
    run-trace-budget-tokens: ${CONTEXT_RUN_TRACE_BUDGET_TOKENS:8192}
    output-reserve-tokens: ${CONTEXT_MAX_OUTPUT_TOKENS:8192}
    compression-max-model-calls-per-run: ${CONTEXT_COMPRESSION_MAX_MODEL_CALLS_PER_RUN:2}
    compression-max-tokens-per-run: ${CONTEXT_COMPRESSION_MAX_TOKENS_PER_RUN:8192}
  tool-approval:
    enabled: ${TOOL_APPROVAL_ENABLED:true}
    timeout-seconds: ${TOOL_APPROVAL_TIMEOUT_SECONDS:600}
  eval:
    enabled: ${EVAL_ENABLED:true}
    case-timeout-seconds: ${EVAL_CASE_TIMEOUT_SECONDS:600}
    max-concurrent-cases: ${EVAL_MAX_CONCURRENT_CASES:1}
  budget:
    max-steps: ${AGENT_MAX_STEPS:50}
    max-model-calls: ${AGENT_MAX_MODEL_CALLS:50}
    max-tool-calls: ${AGENT_MAX_TOOL_CALLS:100}
    timeout-seconds: ${AGENT_TIMEOUT_SECONDS:300}
    max-concurrent-runs: ${AGENT_MAX_CONCURRENT_RUNS:2}
  workspaces:
    coder-agent: ${CODER_AGENT_WORKSPACE_ROOT:${user.dir}}
  tools:
    max-list-entries: 200
    max-read-bytes: 65536
    max-search-results: 100
    max-tool-inline-chars: 4000
    shell-timeout-seconds: 120
    allowed-command-prefixes:
      - cd
      - git status
      - git diff
      - git log
      - git init
      - git reset
      - git rm
      - git clean
      - git restore
      - git checkout -b
      - git add
      - git commit
      - mvn test
      - mvn -q test
      - mvn test -Dtest
      - mvn -Dtest
      - mvn -q -Dtest
      - mvn clean test
      - mvn compile
      - mvn -q compile
      - mvn test-compile
      - mvn -q test-compile
      - mvn package
      - mvn clean package
      - mvn -pl
      - java -version
